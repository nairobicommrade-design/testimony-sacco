<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login | Testimony Sacco</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏦</text></svg>">
<style>
.login-bg {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 60%, #2d5fa6 100%);
  display: flex; align-items: center; justify-content: center;
  padding: 24px; position: relative; overflow: hidden;
}
.login-bg::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23C9A84C' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.login-card {
  background: var(--white); border-radius: 20px;
  padding: 48px 40px; width: 100%; max-width: 440px;
  box-shadow: 0 24px 64px rgba(0,0,0,.25);
  position: relative;
}
.login-logo {
  text-align: center; margin-bottom: 32px;
}
.login-logo .logo-icon {
  width: 72px; height: 72px; font-size: 36px;
  margin: 0 auto 14px; border-radius: 18px;
}
.login-logo h1 {
  font-size: 22px; color: var(--navy); margin-bottom: 4px;
}
.login-logo p { font-size: 13px; color: var(--text-light); }
.role-tabs {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 28px;
  background: var(--warm-gray); border-radius: 12px; padding: 6px;
}
.role-tab {
  padding: 9px 4px; border-radius: 8px; border: none;
  font-size: 12px; font-weight: 600; cursor: pointer;
  color: var(--text-light); background: none; transition: all .25s;
  text-align: center;
}
.role-tab.active { background: var(--white); color: var(--navy); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.show-pw {
  background: none; border: none; cursor: pointer;
  color: var(--text-light); font-size: 18px;
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
}
.pw-wrap { position: relative; }
.demo-hint {
  background: var(--gold-pale); border: 1px solid var(--gold);
  border-radius: 10px; padding: 12px 14px; font-size: 12px;
  color: #8a6820; margin-bottom: 20px;
}
.demo-hint strong { display: block; margin-bottom: 4px; color: var(--navy); }
.back-link {
  text-align: center; margin-top: 24px;
  font-size: 13px; color: var(--text-light);
}
.back-link a { color: var(--navy); font-weight: 600; }
</style>
</head>
<body>

<div class="login-bg">
  <div class="login-card">

    <div class="login-logo">
      <div class="logo-icon">🏦</div>
      <h1>Member Portal</h1>
      <p>Testimony Staff Savings & Credit Co-operative</p>
    </div>

    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('member',this)">👤 Member</button>
      <button class="role-tab" onclick="setRole('officer',this)">👔 Officer</button>
      <button class="role-tab" onclick="setRole('admin',this)">🔐 Admin</button>
    </div>

    <div class="demo-hint" id="demoHint">
      <strong>🧪 Demo Mode</strong>
      Member login: HM018 / sacco123 &nbsp;|&nbsp; Admin: ADMIN / admin123
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="memberNo" id="loginLabel">Member Number</label>
        <input type="text" id="memberNo" placeholder="e.g. HM018" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="show-pw" onclick="togglePw()">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-navy" style="width:100%;justify-content:center;border-radius:12px;height:50px;font-size:16px">
        Sign In →
      </button>
    </form>

    <div class="back-link">
      <a href="index.html">← Back to Website</a>
      &nbsp;·&nbsp;
      <a href="contact.html">Forgot Password?</a>
    </div>

  </div>
</div>

<script src="assets/js/app.js"></script>
<script>
function setRole(role, btn) {
  document.querySelectorAll('.role-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const label = document.getElementById('loginLabel');
  const hint  = document.getElementById('demoHint');
  if (role === 'admin') {
    label.textContent = 'Admin Username';
    document.getElementById('memberNo').placeholder = 'e.g. ADMIN';
    hint.innerHTML = '<strong>🔐 Admin Login</strong>Username: ADMIN &nbsp;|&nbsp; Password: admin123';
  } else if (role === 'officer') {
    label.textContent = 'Officer Code';
    document.getElementById('memberNo').placeholder = 'e.g. CHAIRMAN, TREASURER';
    hint.innerHTML = '<strong>👔 Officer Login</strong>Chairman: CHAIRMAN/chair123 &nbsp;|&nbsp; Treasurer: TREASURER/treas123';
  } else {
    label.textContent = 'Member Number';
    document.getElementById('memberNo').placeholder = 'e.g. HM018';
    hint.innerHTML = '<strong>🧪 Demo Mode</strong>Member login: HM018 / sacco123 &nbsp;|&nbsp; Admin: ADMIN / admin123';
  }
}

function togglePw() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
